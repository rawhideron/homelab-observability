prometheus:
  service:
    type: NodePort
    nodePort: 30900
  prometheusSpec:
    retention: 15d
    retentionSize: "8GB"
    enableRemoteWriteReceiver: true
    externalLabels:
      k8s_cluster_name: zephyrus
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1536Mi
        cpu: 1000m
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

alertmanager:
  service:
    type: NodePort
    nodePort: 30903
  alertmanagerSpec:
    resources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 100m

grafana:
  enabled: true
  adminPassword: "changeme"
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m
  service:
    type: NodePort
    nodePort: 30300
  grafana.ini:
    server:
      root_url: "http://192.168.1.176:30300"
  sidecar:
    datasources:
      defaultDatasourceEnabled: false
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          url: http://172.18.0.5:30900
          access: proxy
          isDefault: true
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.observability.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
    - name: Tempo
      type: tempo
      url: http://tempo.observability.svc.cluster.local:3200
      access: proxy
      isDefault: false
      jsonData:
        httpMethod: GET
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-1m"
          spanEndTimeShift: "1m"
          tags:
            - key: k8s.namespace.name
              value: namespace
            - key: k8s.pod.name
              value: pod
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true
        lokiSearch:
          datasourceUid: loki

nodeExporter:
  enabled: true
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 64Mi
      cpu: 100m

prometheus-node-exporter:
  prometheus:
    monitor:
      metricRelabelings:
        - targetLabel: k8s_cluster_name
          replacement: zephyrus

kubelet:
  serviceMonitor:
    metricRelabelings:
      - action: drop
        sourceLabels: [__name__, le]
        regex: (csi_operations|storage_operation_duration)_seconds_bucket;(0.25|2.5|15|25|120|600)(\.0)?
      - targetLabel: k8s_cluster_name
        replacement: zephyrus
    cAdvisorMetricRelabelings:
      - action: drop
        regex: container_cpu_(cfs_throttled_seconds_total|load_average_10s|system_seconds_total|user_seconds_total)
        sourceLabels: [__name__]
      - action: drop
        regex: container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)
        sourceLabels: [__name__]
      - action: drop
        regex: container_memory_(mapped_file|swap)
        sourceLabels: [__name__]
      - targetLabel: k8s_cluster_name
        replacement: zephyrus

kube-state-metrics:
  resources:
    requests:
      memory: 64Mi
      cpu: 10m
    limits:
      memory: 128Mi
      cpu: 100m
  prometheus:
    monitor:
      metricRelabelings:
        - targetLabel: k8s_cluster_name
          replacement: zephyrus

# Kind clusters don't expose these endpoints
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
