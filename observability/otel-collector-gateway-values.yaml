mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.147.0

rollout:
  strategy: Recreate

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 1536Mi
    cpu: 500m

# Expose OTLP gRPC on a fixed NodePort so the host can DNAT to it
service:
  type: NodePort

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    nodePort: 30317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    nodePort: 30318
    protocol: TCP
  metrics:
    enabled: false
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    memory_limiter:
      check_interval: 1s
      limit_percentage: 75
      spike_limit_percentage: 15
    batch:
      send_batch_size: 256
      timeout: 1s
    resource:
      attributes:
        - key: k8s.cluster.name
          action: upsert
          from_attribute: k8s.cluster.name

  exporters:
    prometheusremotewrite:
      endpoint: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
      resource_to_telemetry_conversion:
        enabled: true
      timeout: 60s
      tls:
        insecure: true
    otlp_http/loki:
      endpoint: http://loki.observability.svc.cluster.local:3100/otlp
      tls:
        insecure: true
    otlp_http/tempo:
      endpoint: http://tempo.observability.svc.cluster.local:4318
      tls:
        insecure: true
      timeout: 10s
      retry_on_failure:
        enabled: false

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  service:
    extensions: [health_check]
    telemetry:
      metrics:
        level: none
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [otlp_http/loki]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [otlp_http/tempo]
