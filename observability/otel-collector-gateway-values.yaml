mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.103.0

# hostNetwork binds directly to 192.168.1.153 — required for Kind clusters
# since NodePort services are not reachable from external hosts on Kind
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 384Mi
    cpu: 500m

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    memory_limiter:
      check_interval: 1s
      limit_percentage: 75
      spike_limit_percentage: 15
    batch:
      send_batch_size: 8192
      timeout: 200ms
    resource:
      attributes:
        - key: k8s.cluster.name
          action: upsert
          from_attribute: k8s.cluster.name

  exporters:
    prometheusremotewrite:
      endpoint: "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write"
      tls:
        insecure: true
    loki:
      endpoint: "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
      default_labels_enabled:
        exporter: false
        job: true
        level: true
    otlp/tempo:
      endpoint: "tempo.observability.svc.cluster.local:4317"
      tls:
        insecure: true

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  service:
    extensions: [health_check]
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [loki]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [otlp/tempo]
